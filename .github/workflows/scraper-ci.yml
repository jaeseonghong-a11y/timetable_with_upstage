name: scraper CI

# push·PR 시 scraper 코드가 바뀌면 자동으로 린트·테스트 (CI gate)
on:
  push:
    paths: ["scraper/**", ".github/workflows/scraper-ci.yml"]
  pull_request:
    paths: ["scraper/**", ".github/workflows/scraper-ci.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scraper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 의존성 설치
        run: pip install -e ".[dev]"
      - name: 린트 (ruff)
        run: ruff check .
      - name: 포맷 검사
        run: ruff format --check .
      - name: 테스트 (pytest)
        run: pytest
